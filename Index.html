<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Pra Você</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      background:#050505;
      color:white;
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      position:relative;
    }

    /* estrelas */

    .stars{
      position:absolute;
      width:100%;
      height:100%;
      overflow:hidden;
      z-index:0;
    }

    .star{
      position:absolute;
      width:2px;
      height:2px;
      background:white;
      border-radius:50%;
      opacity:0.5;
      animation: brilho 4s infinite alternate;
    }

    @keyframes brilho{
      from{
        opacity:0.1;
      }

      to{
        opacity:1;
      }
    }

    /* container principal */

    .container{
      width:90%;
      max-width:850px;
      padding:50px;
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.06);
      backdrop-filter:blur(10px);
      border-radius:25px;
      z-index:2;
      box-shadow:0 0 40px rgba(255,255,255,0.04);

      animation: aparecer 2s ease;
    }

    @keyframes aparecer{
      from{
        opacity:0;
        transform:translateY(25px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      text-align:center;
      margin-bottom:40px;
      font-weight:500;
      font-size:42px;
      letter-spacing:2px;
    }

    .typing{
      font-size:20px;
      line-height:2;
      color:#e7e7e7;
      white-space:pre-line;
      border-right:2px solid white;
      overflow:hidden;
      animation: cursor .8s infinite;
      min-height:450px;
    }

    @keyframes cursor{
      50%{
        border-color:transparent;
      }
    }

    /* botão */

    button{
      margin-top:35px;
      width:100%;
      padding:16px;
      border:none;
      border-radius:14px;
      background:white;
      color:black;
      font-size:17px;
      cursor:pointer;
      transition:0.3s;
      font-weight:500;
    }

    button:hover{
      transform:scale(1.02);
      background:#dcdcdc;
    }

    .extra{
      margin-top:20px;
      text-align:center;
      color:#d4d4d4;
      font-size:17px;
      display:none;

      animation: fade 1.5s ease;
    }

    @keyframes fade{
      from{
        opacity:0;
      }

      to{
        opacity:1;
      }
    }

    /* corações */

    .heart{
      position:absolute;
      color:#ff4d6d;
      font-size:18px;
      animation: subir 6s linear infinite;
      opacity:0.5;
      z-index:1;
    }

    @keyframes subir{

      from{
        transform:translateY(100vh);
        opacity:0;
      }

      20%{
        opacity:0.5;
      }

      to{
        transform:translateY(-120px);
        opacity:0;
      }

    }

    /* celular */

    @media(max-width:700px){

      .container{
        padding:30px;
      }

      h1{
        font-size:32px;
      }

      .typing{
        font-size:17px;
        min-height:520px;
      }

    }

  </style>
</head>

<body>

  <!-- estrelas -->

  <div class="stars"></div>

  <!-- conteúdo -->

  <div class="container">

    <h1>Pra Você</h1>

    <div class="typing" id="texto"></div>

    <button onclick="mostrarMensagem()">
      Não clica aqui
    </button>

    <div class="extra" id="extra">
      Acho que você virou uma das minhas partes favoritas do dia ❤️
    </div>

  </div>

  <script>

    // TEXTO

    const texto = `É estranho perceber como alguém começa a fazer parte dos teus dias sem nem tentar.

Tipo… no começo era só conversa normal.
Só mais uma pessoa entre várias.
Mas aí, sem perceber, eu comecei a prestar atenção em detalhes pequenos:
o jeito que você fala,
as coisas aleatórias que comenta,
as respostas,
até tua presença começou a mudar meu humor sem motivo.

E acho engraçado porque não foi algo planejado.
Só aconteceu naturalmente.

Hoje em dia às vezes eu me pego pensando em alguma coisa e automaticamente lembro de você.
E sinceramente?
isso é novo pra mim.

Talvez eu ainda não saiba explicar exatamente o que isso significa.
Mas sei que tua presença deixou meus dias diferentes de um jeito bom.`;

    let i = 0;

    function escreverTexto(){

      if(i < texto.length){

        document.getElementById("texto").innerHTML += texto.charAt(i);

        i++;

        setTimeout(escreverTexto, 28);

      }

    }

    escreverTexto();

    // ESTRELAS

    const stars = document.querySelector('.stars');

    for(let i = 0; i < 140; i++){

      let star = document.createElement('div');

      star.classList.add('star');

      star.style.top = Math.random() * 100 + '%';
      star.style.left = Math.random() * 100 + '%';

      star.style.animationDuration =
      (Math.random() * 4 + 2) + 's';

      stars.appendChild(star);

    }

    // CORAÇÕES

    function criarCoracao(){

      const heart = document.createElement('div');

      heart.classList.add('heart');

      heart.innerHTML = '❤';

      heart.style.left = Math.random() * 100 + 'vw';

      heart.style.fontSize =
      (Math.random() * 15 + 12) + 'px';

      document.body.appendChild(heart);

      setTimeout(() => {

        heart.remove();

      }, 6000);

    }

    setInterval(criarCoracao, 1200);

    // BOTÃO

    function mostrarMensagem(){

      document.getElementById('extra').style.display = 'block';

    }

  </script>

</body>
</html>
